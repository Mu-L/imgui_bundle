<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Redirecting to imgui-bundle.pages.dev</title>
<script>
(function () {
  var base = "/imgui_bundle";
  var newHost = "https://imgui-bundle.pages.dev";
  var path = window.location.pathname;
  if (path.indexOf(base) === 0) {
    path = path.substring(base.length);
  }
  if (path === "") {
    path = "/";
  }
  window.location.replace(newHost + path + window.location.search + window.location.hash);
})();
</script>
<meta http-equiv="refresh" content="2; url=https://imgui-bundle.pages.dev/">
</head>
<body>
<p>The documentation has moved to
<a href="https://imgui-bundle.pages.dev/">imgui-bundle.pages.dev</a>.
Redirecting...</p>
</body>
</html>
