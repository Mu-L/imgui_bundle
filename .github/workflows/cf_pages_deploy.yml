name: Cloudflare Pages deploy

on:
  workflow_dispatch:
#  pull_request:
#  release:
#    types:
#      - published
#  push:
#    branches:
#      - master
#      - main

# Refuse concurrent runs
concurrency:
  group: cf-pages-deploy
  cancel-in-progress: false

jobs:
  build:
    name: "Build Cloudflare Pages deploy"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Test env
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          echo "Account: $CLOUDFLARE_ACCOUNT_ID"


      # install just
      - uses: extractions/setup-just@v4

      # install emscripten (and cache it)
      - name: Setup emsdk
        uses: emscripten-core/setup-emsdk@v15
        with:
          # Make sure to set a version number!
          version: 5.0.4
          # This is the name of the cache folder.
          # The cache folder will be placed in the build directory,
          #  so make sure it doesn't conflict with anything!
          actions-cache-folder: 'emsdk-cache'

      - name: Verify emscripten toolchain
        run: emcc -v

      # Install python 3.13 required by pyodide
      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'

#      - name: Setup interactive tmate session
#        uses: mxschmitt/action-tmate@v3

      - name: Prepare Pyodide build environment
        run: |
          just pyodide_setup_local_build

      - name: Build Pyodide wheel
        run: |
          just pyodide_build

      - name: Build Bundle Explorer Binaries
        run: just ibex_build

      - name: Stage site
        run: just cf_stage

      - name: Install wrangler
        run: npm install -g wrangler

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: just cf_deploy
